<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NekoStream CLI Player</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      overflow: hidden;
      font-family: sans-serif;
    }
    #player-container {
      width: 100%;
      height: 100%;
    }
    webview {
      width: 100%;
      height: 100%;
      border: none;
    }
    #top-nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(5, 8, 13, 0.82), rgba(5, 8, 13, 0.22), rgba(5, 8, 13, 0));
      color: rgba(255, 255, 255, 0.92);
      -webkit-app-region: drag;
      user-select: none;
      pointer-events: auto;
    }
    .nav-title {
      min-width: 0;
      padding-left: 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .window-controls {
      display: flex;
      height: 32px;
      margin-right: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(8, 12, 20, 0.38);
      backdrop-filter: blur(10px);
      pointer-events: auto;
      -webkit-app-region: no-drag;
    }
    .window-btn {
      width: 42px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      background: transparent;
      color: rgba(255, 255, 255, 0.82);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .window-btn:last-child {
      border-right: 0;
    }
    .window-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }
    .window-btn.close:hover {
      background: #e5484d;
      color: #fff;
    }
    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9997;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #E11D48;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 16px;
      color: #aaa;
      letter-spacing: 1px;
    }
  </style>
  <script src="./node_modules/hls.js/dist/hls.min.js"></script>
  <script src="./node_modules/artplayer/dist/artplayer.js"></script>
</head>
<body>
  <header id="top-nav">
    <div class="nav-title" id="nav-title">NekoStream Player</div>
    <div class="window-controls">
      <button class="window-btn" id="window-minimize" title="Minimize">-</button>
      <button class="window-btn" id="window-maximize" title="Maximize">□</button>
      <button class="window-btn close" id="window-close" title="Close">×</button>
    </div>
  </header>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Đang tải và làm sạch trình phát...</div>
  </div>
  <div id="player-container"></div>

  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('main-log', (e, msg) => {
      console.log('[Main Process]', msg);
    });

    document.getElementById('window-minimize').addEventListener('click', () => {
      ipcRenderer.send('player:minimize');
    });
    document.getElementById('window-maximize').addEventListener('click', () => {
      ipcRenderer.send('player:toggle-maximize');
    });
    document.getElementById('window-close').addEventListener('click', () => {
      window.close();
    });
    
    // Keyboard shortcut: Escape to close
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.close();
    });


    window.initPlayer = function(streamInfo, baseDir, cleanUA) {
      const container = document.getElementById('player-container');
      const navTitle = document.getElementById('nav-title');
      navTitle.textContent = streamInfo.provider ? `NekoStream · ${streamInfo.provider}` : 'NekoStream Player';
      
      if (streamInfo.type === 'iframe') {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => { overlay.style.display = 'none'; }, 500);
        }, 5500);

        const isGooglePlayer = streamInfo.url.includes('googleapiscdn.com') || streamInfo.url.includes('googleapis.com') || streamInfo.url.includes('abyss') || streamInfo.url.includes('hydrax');
        
        const fs = require('fs');
        const path = require('path');
        const originalPreloadPath = path.resolve(baseDir || __dirname, 'webview-preload.js');
        let preloadPath = originalPreloadPath;

        try {
          let preloadContent = fs.readFileSync(originalPreloadPath, 'utf-8');
          // Inject streamInfo directly into the preload script scope
          const configInject = `const __streamInfo = ${JSON.stringify(streamInfo)};\n`;
          preloadContent = configInject + preloadContent;

          // Write to a temporary file
          const tempPreloadPath = path.resolve(baseDir || __dirname, 'webview-preload-temp.js');
          fs.writeFileSync(tempPreloadPath, preloadContent);
          preloadPath = tempPreloadPath;
          console.log('[Renderer] Created temp preload script at:', preloadPath);

          // Delete temp preload script when window closes
          window.addEventListener('unload', () => {
            try {
              if (fs.existsSync(tempPreloadPath)) {
                fs.unlinkSync(tempPreloadPath);
              }
            } catch (e) {}
          });
        } catch (e) {
          console.error('[Renderer] Failed to generate temp preload script, falling back to original:', e);
        }

        // For Google Player: MUST load referer page first so the player thinks it's in an iframe
        // (googleapiscdn checks window.self !== window.top and refuses to play if at top level)
        // The preload script runs in BOTH the referer page AND the injected iframe subframe
        // via nodeIntegrationInSubFrames=yes
        let webviewSrc = streamInfo.url;
        if (isGooglePlayer && streamInfo.headers && streamInfo.headers.Referer) {
          webviewSrc = streamInfo.headers.Referer;
        }

        console.log('[Renderer] Webview src:', webviewSrc, '| preload:', preloadPath);

        const webview = document.createElement('webview');
        webview.setAttribute('partition', 'persist:player-session');
        
        const defaultUA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';
        webview.setAttribute('useragent', cleanUA || defaultUA);
        webview.setAttribute('allowpopups', 'false');
        webview.setAttribute('webpreferences', 'contextIsolation=no, nodeIntegration=no, nodeIntegrationInSubFrames=no');
        webview.setAttribute('preload', preloadPath);
        webview.setAttribute('src', webviewSrc);  // src LAST so preload registers first
        webview.addEventListener('console-message', (e) => {
          console.log('[Webview Console]', e.message);
        });

        webview.addEventListener('dom-ready', () => {
          try {
            console.log('[Renderer Webview] dom-ready for:', webview.getURL());

            // Step 2: For Google Player, replace page body with a fullscreen iframe pointing to the actual stream
            // This makes googleapiscdn think it's embedded (window.self !== window.top = true inside the iframe)
            if (isGooglePlayer) {
              const streamUrl = JSON.stringify(streamInfo.url);
              
              // Inject CSS to hide everything except our player iframe
              const cssText = `
                body > *:not(#__neko_player__) {
                  display: none !important;
                }
                html, body {
                  margin: 0 !important;
                  padding: 0 !important;
                  overflow: hidden !important;
                  background: #000 !important;
                  width: 100% !important;
                  height: 100% !important;
                }
                #__neko_player__ {
                  position: fixed !important;
                  top: 0 !important;
                  left: 0 !important;
                  width: 100vw !important;
                  height: 100vh !important;
                  border: none !important;
                  z-index: 2147483647 !important;
                  background: #000 !important;
                }
              `;
              webview.insertCSS(cssText).catch(() => {});

              webview.executeJavaScript(`
                (function() {
                  if (!document.getElementById('__neko_player__')) {
                    window.stop();
                    const f = document.createElement('iframe');
                    f.id = '__neko_player__';
                    f.src = ${streamUrl};
                    f.setAttribute('allowfullscreen','true');
                    document.body.appendChild(f);
                    console.log('[Injected] Google Player iframe appended:', f.src);
                    return true;
                  }
                  return false;
                })();
              `)
              .then((injected) => {
                if (injected) {
                  console.log('[Renderer Webview] Player iframe injected successfully');
                }
              })
              .catch((err) => console.error('[Renderer Webview] Player inject failed:', err));
              return;
            }

            // Step 3: For other providers (Anime47), run UI isolation
            if (!isGooglePlayer) {
              const fs = require('fs');
              const path = require('path');
              try {
                const css = fs.readFileSync(path.join(baseDir || __dirname, 'isolate.css'), 'utf-8');
                const js = fs.readFileSync(path.join(baseDir || __dirname, 'isolate.js'), 'utf-8');
                webview.insertCSS(css);
                webview.executeJavaScript(js);
              } catch (e) {
                console.error('[Renderer Webview] Isolation inject failed:', e);
              }
            }
          } catch (e) {
            console.error('[Renderer Webview] dom-ready error:', e);
          }
        });

        container.appendChild(webview);
      } else {
        // Use Artplayer for m3u8 / mp4
        const artType = streamInfo.type === 'hls' ? 'm3u8' : streamInfo.type;
        const art = new Artplayer({
          container: container,
          url: streamInfo.url,
          type: artType,
          title: streamInfo.provider || 'NekoStream CLI',
          poster: '',
          volume: 0.5,
          isLive: false,
          muted: false,
          autoplay: false, // Must be false for customType, we play manually inside MANIFEST_PARSED
          pip: true,
          autoSize: true,
          autoMini: true,
          setting: true,
          loop: false,
          flip: true,
          playbackRate: true,
          aspectRatio: true,
          fullscreen: true,
          fullscreenWeb: true,
          subtitleOffset: true,
          miniProgressBar: true,
          mutex: true,
          backdrop: true,
          playsInline: true,
          autoPlayback: true,
          airplay: true,
          theme: '#ff0055',
          customType: {
            m3u8: function(video, url) {
              if (Hls.isSupported()) {
                const hls = new Hls({
                  xhrSetup: function(xhr, url) {
                    // Note: headers are already intercepted in main process
                  }
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                  art.play().catch(() => {});
                });
                // Handle HLS errors so it doesn't just spin
                hls.on(Hls.Events.ERROR, function(event, data) {
                  if (data.fatal) {
                    switch(data.type) {
                      case Hls.ErrorTypes.NETWORK_ERROR:
                        hls.startLoad();
                        break;
                      case Hls.ErrorTypes.MEDIA_ERROR:
                        hls.recoverMediaError();
                        break;
                      default:
                        hls.destroy();
                        break;
                    }
                  }
                });
              } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                art.play().catch(() => {});
              }
            }
          }
        });
      }
    };
  </script>
</body>
</html>
